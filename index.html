<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Establecimiento de Metas - Brian Tracy</title>
    <!-- Icono de pestaña (Emoji 🎯) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>">
    
    <!-- Enlace al archivo CSS externo -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Librerías externas: jsPDF y Tailwind -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div class="w-full max-w-2xl mt-10 mb-20">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold tracking-widest uppercase mb-2 text-gradient">ESTABLECIMIENTO DE METAS</h1>
            <p class="text-sm opacity-80 text-cyan-500" id="current-date-display"></p>
        </header>

        <div class="glass-card p-8 rounded-lg">
            <div id="setup-form" class="space-y-8">
                <!-- Formulario -->
                <div>
                    <label class="block mb-2 font-bold uppercase text-s tracking-tighter">1. ¿Cuales son sus 5 valores básicos?</label>
                    <textarea id="q1" rows="3" class="w-full p-3 rounded" placeholder="Escribe tu respuesta aquí..."></textarea>
                </div>

                <div>
                    <label class="block mb-2 font-bold uppercase text-s tracking-tighter">2. Escribe tus 3 metas más importantes</label>
                    <textarea id="q2" rows="3" class="w-full p-3 rounded" placeholder="Escribe tu respuesta aquí..."></textarea>
                </div>

                <div>
                    <label class="block mb-2 font-bold uppercase text-s tracking-tighter">3. ¿Qué haría si le dicen que le quedan 6 meses de vida?</label>
                    <input id="q3" type="text" class="w-full p-3 rounded" placeholder="Escribe tu respuesta aquí...">
                </div>

                <div>
                    <label class="block mb-2 font-bold uppercase text-s tracking-tighter">4. ¿Qué harías si te toca 1 millón en la lotería?</label>
                    <textarea id="q4" rows="3" class="w-full p-3 rounded" placeholder="Escribe tu respuesta aquí..."></textarea>
                </div>

                <div>
                    <label class="block mb-2 font-bold uppercase text-s tracking-tighter">5. ¿Qué es lo que siempre ha querido hacer pero ha tenido miedo de intentar?</label>
                    <textarea id="q5" rows="3" class="w-full p-3 rounded" placeholder="Escribe tu respuesta aquí..."></textarea>
                </div>

                <div>
                    <label class="block mb-2 font-bold uppercase text-s tracking-tighter">6. ¿Cuando ha sido más feliz, cuando se ha sentido más feliz consigo mismo?</label>
                    <textarea id="q6" rows="3" class="w-full p-3 rounded" placeholder="Escribe tu respuesta aquí..."></textarea>
                </div>

                <div>
                    <label class="block mb-2 font-bold uppercase text-s tracking-tighter">7. ¿Qué gran cosa se atrevería a soñar si supiera que no podría fallar?</label>
                    <textarea id="q7" rows="3" class="w-full p-3 rounded" placeholder="Escribe tu respuesta aquí..."></textarea>
                </div>

                <div class="pt-6">
                    <button id="download-btn" onclick="generatePDF()" class="w-full py-4 rounded font-bold uppercase tracking-wider btn-gradient">
                        Generar Informe de Metas (PDF)
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer class="w-full mt-auto py-6 text-center text-xs opacity-60">
        <p>javilindj &copy; <span id="year"></span> Todos los derechos reservados</p>
    </footer>

    <!-- Script principal -->
    <script src="script.js"></script>
</body>
</html>
